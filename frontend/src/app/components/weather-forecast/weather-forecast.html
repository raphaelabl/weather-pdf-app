<div class="flex w-full justify-center bg-[#f0f0f0] py-10">
  <form class="flex flex-col gap-4 w-1/2" (ngSubmit)="getForecast()">
    <h1 class="text-3xl w-full text-center">Wetterprognose für</h1>
    <div class="flex flex-row w-full gap-2">
      <input type="text" class="basis-2/3 input-filed" placeholder="Straße" [(ngModel)]="addressStruct.street" name="street" required>
      <input type="text" class="basis-1/3 input-filed" placeholder="Hausnummer" [(ngModel)]="addressStruct.houseNumber" name="houseNumber" required>
    </div>
    <div class="flex flex-row w-full gap-2">
      <input type="text" class="basis-1/3 input-filed" placeholder="Postleitzahl" [(ngModel)]="addressStruct.postalCode" name="postalCode" required>
      <input type="text" class="basis-2/3 input-filed" placeholder="Stadt" [(ngModel)]="addressStruct.city" name="city" required>
    </div>
    <input type="text" class="input-filed" placeholder="Land" [(ngModel)]="addressStruct.country" name="country">
    <button type="submit" class="input-filed">Prognose</button>
  </form>
</div>

<div class="grid grid-cols-2 w-full p-10 gap-10">
  @for (forecast of forecasts; track forecast) {
    <div class="flex flex-col min-w-150 w-100 max-w-100 min-h-100 max-h-100 border-2 border-gray-300 rounded-2xl">
      <iframe [srcdoc]="forecast" class="w-full h-full rounded-2xl"></iframe>
      <hr>
      <button class="btn bg-blue-300 rounded-b-xl" (click)="downloadAsPdf(forecast)">Download Page as PDF</button>
    </div>
  }
</div>
